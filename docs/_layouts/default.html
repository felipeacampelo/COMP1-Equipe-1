<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title | default: site.github.repository_name }}</title>
  </head>
  <body>
    <div class="sidebar">
      <div class="sidebar-header">
        <h2>{{ site.title }}</h2>
        <p>{{ site.description }}</p>
      </div>
      
      <nav class="sidebar-nav">
        <a href="{{ site.baseurl }}/" {% if page.url == "/" or page.url == "/index.html" %}class="active"{% endif %}>Início</a>
        <a href="{{ site.baseurl }}/sprints.html" {% if page.url contains "sprints" %}class="active"{% endif %}>Sprints</a>
        <a href="{{ site.baseurl }}/grammar.html" {% if page.url contains "grammar" %}class="active"{% endif %}>Gramática</a>
        <a href="{{ site.baseurl }}/lexer.html" {% if page.url contains "lexer" %}class="active"{% endif %}>Lexer</a>
        <a href="{{ site.baseurl }}/parser.html" {% if page.url contains "parser" %}class="active"{% endif %}>Parser</a>
        <a href="{{ site.baseurl }}/examples.html" {% if page.url contains "examples" %}class="active"{% endif %}>Exemplos</a>
      </nav>
      
      <div class="sidebar-footer">
        {% if site.github.is_project_page %}
          <a href="{{ site.github.repository_url }}" target="_blank">Ver no GitHub</a>
        {% endif %}
      </div>
    </div>

    <main class="content">
      {{ content }}
      
      <footer class="content-footer">
        <p>Projeto COMP1 - Compiladores</p>
      </footer>
    </main>
  </body>
</html>
